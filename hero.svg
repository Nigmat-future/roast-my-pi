<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img" aria-label="roast-my-pi: 选错导师，毁掉五年">
  <title>roast-my-pi · 导师锐评</title>
  <desc>墨白封面。署名位置决定真实贡献——Nature 一作不等于第 28 作者。</desc>

  <style>
    .bg{fill:#f4efe6}
    .ink{fill:#1a1814}
    .muted{fill:#5c574f}
    .hair{stroke:rgba(26,24,20,0.12)}
    .accent{stroke:#8b3a3a}
    .accentf{fill:#8b3a3a}
    .stroke{fill:none;stroke:#1a1814;stroke-linecap:round;stroke-linejoin:round}
    .accent-stroke{fill:none;stroke:#8b3a3a;stroke-linecap:round}
  </style>

  <rect class="bg" width="1200" height="440"/>

  <!-- editorial hairlines -->
  <line class="hair" x1="72" y1="48" x2="72" y2="392" stroke-width="1"/>
  <line class="hair" x1="640" y1="48" x2="640" y2="392" stroke-width="1"/>

  <!-- eyebrow -->
  <text x="88" y="88" class="muted"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="13" letter-spacing="4">ADVISOR · X-RAY</text>

  <!-- title -->
  <text x="80" y="168" class="ink"
        font-family="Noto Serif SC, Songti SC, serif"
        font-size="52" font-weight="500" letter-spacing="2">导师锐评</text>
  <text x="80" y="218" class="ink"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="28" font-style="italic" letter-spacing="1">roast-my-pi</text>

  <!-- accent rule -->
  <line class="accent" x1="80" y1="240" x2="180" y2="240" stroke-width="2"/>

  <!-- tagline -->
  <text x="80" y="290" class="ink"
        font-family="Noto Serif SC, Songti SC, serif"
        font-size="26" font-weight="500" letter-spacing="1">选错导师，<tspan class="accentf">毁掉五年。</tspan></text>
  <text x="80" y="328" class="muted"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="20" font-style="italic">One wrong advisor, five years gone.</text>

  <!-- three lenses -->
  <text x="80" y="378" class="muted"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="12" letter-spacing="3">independence · funding · power-structure</text>

  <!-- ===== right: hand-drawn author position track ===== -->
  <text x="700" y="120" class="muted"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="12" letter-spacing="3">AUTHOR POSITION</text>

  <!-- baseline -->
  <line class="stroke" x1="700" y1="260" x2="1120" y2="260" stroke-width="1.2" opacity="0.35"/>

  <!-- faint ticks -->
  <g class="hair" stroke-width="1" opacity="0.5">
    <line x1="730" y1="260" x2="730" y2="254"/>
    <line x1="760" y1="260" x2="760" y2="254"/>
    <line x1="790" y1="260" x2="790" y2="254"/>
    <line x1="820" y1="260" x2="820" y2="254"/>
    <line x1="850" y1="260" x2="850" y2="254"/>
    <line x1="880" y1="260" x2="880" y2="254"/>
    <line x1="910" y1="260" x2="910" y2="254"/>
    <line x1="940" y1="260" x2="940" y2="254"/>
    <line x1="970" y1="260" x2="970" y2="254"/>
    <line x1="1000" y1="260" x2="1000" y2="254"/>
    <line x1="1030" y1="260" x2="1030" y2="254"/>
    <line x1="1060" y1="260" x2="1060" y2="254"/>
    <line x1="1090" y1="260" x2="1090" y2="254"/>
  </g>

  <!-- position 1: bold ink stroke -->
  <path class="stroke" stroke-width="4" d="M700 260 L700 175" opacity="0.9"/>
  <text x="700" y="284" class="ink"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="12" text-anchor="middle">1st</text>
  <text x="700" y="155" class="muted"
        font-family="Noto Serif SC, Songti SC, serif"
        font-size="11" text-anchor="middle">真本事</text>

  <!-- position 28: broken + accent reticle -->
  <path class="stroke" stroke-width="1.5" stroke-dasharray="4 6" d="M1110 260 L1110 195" opacity="0.35"/>
  <circle cx="1110" cy="218" r="20" class="accent-stroke" stroke-width="1.2" opacity="0.75"/>
  <line class="accent" x1="1086" y1="218" x2="1096" y2="218" stroke-width="1"/>
  <line class="accent" x1="1124" y1="218" x2="1134" y2="218" stroke-width="1"/>
  <text x="1110" y="284" class="accentf"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="12" text-anchor="middle">28th</text>
  <text x="1110" y="175" class="accentf"
        font-family="Noto Serif SC, Songti SC, serif"
        font-size="11" text-anchor="middle">递样本</text>

  <!-- independence ratio bar -->
  <text x="700" y="340" class="muted"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="11" letter-spacing="2">INDEPENDENCE 0.18 / 0.30</text>
  <line x1="700" y1="358" x2="920" y2="358" stroke="rgba(26,24,20,0.12)" stroke-width="1"/>
  <line x1="700" y1="358" x2="756" y2="358" stroke="#8b3a3a" stroke-width="2.5" opacity="0.65"/>
  <line x1="820" y1="352" x2="820" y2="364" stroke="#1a1814" stroke-width="1" opacity="0.3"/>
  <text x="820" y="378" class="muted"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="9" text-anchor="middle">门槛</text>

  <text x="1120" y="420" class="muted"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="10" text-anchor="end" letter-spacing="2">墨白</text>
</svg>