<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>导师锐评 · roast-my-pi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f4efe6;
  --ink:#1a1814;
  --muted:#5c574f;
  --rule:rgba(26,24,20,0.12);
  --accent:#8b3a3a;
  --accent-green:#4a5d52;
  --serif-en:"Cormorant Garamond",Georgia,serif;
  --serif-zh:"Noto Serif SC","Songti SC",serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{
  font-family:var(--serif-zh);background:var(--paper);color:var(--ink);
  line-height:1.7;overflow-x:hidden;min-height:100dvh;
}
body[data-lang="en"]{font-family:var(--serif-en)}
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
}
.wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:0 clamp(1.25rem,4vw,2.5rem)}
.section{padding:clamp(4.5rem,10vw,8rem) 0}

.nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(244,239,230,0.92);border-bottom:1px solid var(--rule);
}
.nav-inner{
  max-width:1080px;margin:0 auto;padding:.9rem clamp(1.25rem,4vw,2.5rem);
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
}
.nav-brand{
  font-family:var(--serif-en);font-size:.82rem;letter-spacing:.22em;
  text-transform:uppercase;color:var(--muted);
}
.nav-right{display:flex;align-items:center;gap:clamp(.75rem,2vw,1.5rem)}
.nav-links{display:flex;align-items:center;gap:clamp(.75rem,2vw,1.5rem);font-size:.82rem}
.nav-links a{color:var(--muted);text-decoration:none;letter-spacing:.06em;transition:color .3s}
.nav-links a:hover{color:var(--ink)}
.nav-cta{
  padding:.45rem 1rem;border:1px solid var(--ink);color:var(--ink)!important;
  letter-spacing:.1em;transition:background .3s,color .3s;
}
.nav-cta:hover{background:var(--ink);color:var(--paper)!important}
.lang-switch{
  display:flex;align-items:center;gap:0;font-family:var(--serif-en);font-size:.75rem;
  letter-spacing:.08em;border:1px solid var(--rule);
}
.lang-switch button{
  background:transparent;border:none;padding:.35rem .6rem;cursor:pointer;
  color:var(--muted);transition:color .3s,background .3s;font-family:inherit;
  font-size:inherit;letter-spacing:inherit;
}
.lang-switch button.active{background:var(--ink);color:var(--paper)}
.lang-switch button:not(.active):hover{color:var(--ink)}

.hero{padding:clamp(7rem,14vw,11rem) 0 clamp(4rem,8vw,6rem)}
.hero-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:clamp(2rem,6vw,5rem);align-items:center;
}
.eyebrow{
  font-family:var(--serif-en);font-size:.72rem;letter-spacing:.28em;
  text-transform:uppercase;color:var(--muted);margin-bottom:2rem;
}
.eyebrow::before{content:"— ";color:var(--accent)}
.hero h1{
  font-size:clamp(2.4rem,6.5vw,4.5rem);font-weight:500;
  line-height:1.18;letter-spacing:.04em;max-width:9em;
}
body[data-lang="zh"] .hero h1{font-family:var(--serif-zh)}
body[data-lang="en"] .hero h1{font-family:var(--serif-en);letter-spacing:-.01em;max-width:10em}
.hero h1 .accent{color:var(--accent)}
.hero .sub{
  font-family:var(--serif-en);font-style:italic;font-weight:400;
  font-size:clamp(1.1rem,2.5vw,1.45rem);color:var(--muted);
  margin-top:1.75rem;letter-spacing:.02em;
}
.hero .cta{
  display:inline-block;margin-top:2.5rem;padding:.7rem 0;
  font-size:.88rem;letter-spacing:.14em;color:var(--ink);
  text-decoration:none;border-bottom:1px solid var(--ink);
  transition:color .3s,border-color .3s;
}
.hero .cta:hover{color:var(--accent);border-color:var(--accent)}
.hero-visual{display:flex;align-items:center;justify-content:center;padding:clamp(1rem,3vw,2rem) 0}
.hero-visual svg{width:100%;max-width:420px;height:auto}

.band{
  padding:clamp(3.5rem,8vw,5.5rem) 0;
  border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);text-align:center;
}
.band q{
  font-size:clamp(1.2rem,3vw,1.85rem);font-weight:400;
  line-height:1.65;letter-spacing:.03em;display:block;max-width:28em;margin:0 auto;
}
body[data-lang="zh"] .band q{font-family:var(--serif-zh)}
body[data-lang="en"] .band q{font-family:var(--serif-en);max-width:22em}
.band q .accent{color:var(--accent)}
.band .cite{
  font-family:var(--serif-en);font-size:.7rem;letter-spacing:.24em;
  text-transform:uppercase;color:var(--muted);margin-top:2rem;
}

.section-head{max-width:36em;margin-bottom:clamp(2.5rem,6vw,4rem)}
.h2{font-size:clamp(1.75rem,4vw,2.75rem);font-weight:500;line-height:1.25;letter-spacing:.03em}
body[data-lang="zh"] .h2{font-family:var(--serif-zh)}
body[data-lang="en"] .h2{font-family:var(--serif-en);letter-spacing:-.01em}
.h2 .accent{color:var(--accent)}
.lede{color:var(--muted);font-size:.95rem;margin-top:1.25rem;line-height:1.8;letter-spacing:.02em}

.lenses{display:grid;grid-template-columns:1.1fr .9fr;gap:clamp(1.5rem,4vw,3rem)}
.lens{padding:clamp(1.75rem,4vw,2.5rem) 0;border-top:1px solid var(--rule)}
.lens-num{
  font-family:var(--serif-en);font-size:clamp(3.5rem,8vw,5rem);
  font-weight:400;line-height:1;letter-spacing:-.03em;color:var(--accent);
}
.lens-num sup{font-size:.35em;vertical-align:super}
.lens-title{font-weight:500;font-size:1rem;margin:.75rem 0 .35rem;letter-spacing:.04em}
.lens-hint{font-size:.82rem;color:var(--muted);line-height:1.75;max-width:28em}
.lens-split{display:grid;grid-template-columns:1fr 1fr;gap:2rem;padding-top:1rem}
.lens-split .metric{font-family:var(--serif-en);font-size:2rem;color:var(--accent-green);margin-bottom:.35rem}
.lens-bar{position:relative;height:1px;background:var(--rule);margin-top:2rem}
.lens-bar .fill{position:absolute;top:0;left:0;height:100%;background:var(--accent);opacity:.45}
.lens-bar .mark{position:absolute;top:-5px;width:1px;height:11px;background:var(--ink);opacity:.3}

.flags{display:flex;flex-direction:column}
.flag{
  display:grid;grid-template-columns:3rem 1fr;gap:1.5rem;
  padding:2rem 0;border-top:1px solid var(--rule);align-items:start;
}
.flag:last-child{border-bottom:1px solid var(--rule)}
.flag .fnum{font-family:var(--serif-en);font-size:.85rem;letter-spacing:.12em;color:var(--accent);padding-top:.15rem}
.flag h3{font-weight:500;font-size:1.1rem;line-height:1.4;letter-spacing:.03em;margin-bottom:.4rem}
body[data-lang="zh"] .flag h3{font-family:var(--serif-zh)}
body[data-lang="en"] .flag h3{font-family:var(--serif-en)}
.flag h3 .accent{color:var(--accent)}
.flag p{font-size:.82rem;color:var(--muted);line-height:1.75;max-width:42em}

.report-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:clamp(2rem,5vw,4rem);align-items:start}
.report{padding-top:1rem;border-top:1px solid var(--rule)}
.verdict{
  font-family:var(--serif-en);font-size:.68rem;letter-spacing:.2em;
  text-transform:uppercase;color:var(--accent);margin-bottom:1.5rem;
}
.ind{
  font-family:var(--serif-en);font-size:clamp(2.5rem,5vw,3.5rem);
  font-weight:400;line-height:1;letter-spacing:-.02em;
}
.ind .accent{color:var(--accent)}
.ind-sub{font-size:.8rem;color:var(--muted);margin:1rem 0 2rem;letter-spacing:.04em}
.rows .row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:.75rem 0;border-bottom:1px solid var(--rule);font-size:.85rem;gap:1rem;
}
.rows .row:last-child{border-bottom:0}
.rows .row .v{font-family:var(--serif-en);color:var(--accent);font-size:.82rem;white-space:nowrap}
.quote{
  margin-top:2rem;padding-left:1.25rem;border-left:2px solid var(--accent);
  font-size:.85rem;line-height:1.8;color:var(--muted);
}
.quote strong{color:var(--ink);font-weight:500}

.qs{padding-top:1rem;border-top:1px solid var(--rule)}
.qs h4{font-weight:500;font-size:1.1rem;margin-bottom:1.25rem;letter-spacing:.04em}
body[data-lang="zh"] .qs h4{font-family:var(--serif-zh)}
body[data-lang="en"] .qs h4{font-family:var(--serif-en)}
.codeblock{
  font-family:ui-monospace,monospace;font-size:.75rem;
  background:var(--ink);color:var(--paper);
  padding:1rem 1.15rem;margin-bottom:1.5rem;letter-spacing:.02em;
}
.codeblock span{color:var(--accent)}
.qs .req{font-size:.72rem;color:var(--muted);letter-spacing:.1em;margin-bottom:.75rem}
.qs ul{list-style:none}
.qs li{
  font-size:.82rem;color:var(--muted);padding:.3rem 0;
  padding-left:1rem;position:relative;line-height:1.6;
}
.qs li::before{content:"·";position:absolute;left:0;color:var(--accent)}
.qs .warn{margin-top:1.25rem;font-size:.75rem;color:var(--accent);letter-spacing:.04em}

.phases{display:grid;grid-template-columns:repeat(5,1fr);gap:clamp(1rem,3vw,1.5rem)}
.phase{padding:1.5rem 0;border-top:1px solid var(--rule)}
.phase .tag{font-family:var(--serif-en);font-size:.62rem;letter-spacing:.18em;color:var(--accent);margin-bottom:.75rem;display:block}
.phase .nm{font-weight:500;font-size:.95rem;margin-bottom:.3rem;letter-spacing:.03em}
.phase .wh{font-size:.75rem;color:var(--muted);line-height:1.65}

.footer{padding:clamp(3rem,6vw,5rem) 0 clamp(2.5rem,5vw,4rem);border-top:1px solid var(--rule)}
.footer-inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1.5rem}
.footer .brand{font-family:var(--serif-en);font-style:italic;font-size:1.15rem;color:var(--muted)}
.footer .links{display:flex;gap:2rem}
.footer a{color:var(--muted);text-decoration:none;font-size:.8rem;letter-spacing:.04em;transition:color .3s}
.footer a:hover{color:var(--ink)}
.footer .copy{font-family:var(--serif-en);font-size:.68rem;letter-spacing:.14em;color:var(--muted);margin-top:2.5rem;text-transform:uppercase}
.footer .copy span{color:var(--accent)}

.ink-stroke{fill:none;stroke:var(--ink);stroke-linecap:round;stroke-linejoin:round}
.accent-stroke{stroke:var(--accent)}
.accent-fill{fill:var(--accent)}

.reveal{opacity:0;transform:translateY(1.5rem);transition:opacity .8s ease,transform .8s ease}
.reveal.in{opacity:1;transform:none}
.d1{transition-delay:.1s}.d2{transition-delay:.2s}

@media(max-width:820px){
  .hero-grid,.lenses,.report-grid{grid-template-columns:1fr}
  .hero-visual{order:-1;max-width:320px;margin:0 auto}
  .lens-split{grid-template-columns:1fr;gap:1.5rem}
  .phases{grid-template-columns:repeat(2,1fr)}
  .phases .phase:last-child{grid-column:span 2}
  .nav-links a:not(.nav-cta){display:none}
}
@media(max-width:520px){
  .phases{grid-template-columns:1fr}
  .phases .phase:last-child{grid-column:span 1}
  .flag{grid-template-columns:2rem 1fr;gap:1rem}
  .footer-inner{flex-direction:column;text-align:center}
}
</style>
</head>

function get(obj, path) {
  return path.split('.').reduce((o, k) => o?.[k], obj);
}

function renderLists(lang) {
  const t = I18N[lang];
  document.getElementById('flags-list').innerHTML = t.flags.items.map((item, i) => `
    <div class="flag reveal${i ? ' d' + Math.min(i, 2) : ''}">
      <div class="fnum">${String(i + 1).padStart(2, '0')}</div>
      <div><h3>${item.title}</h3><p>${item.body}</p></div>
    </div>`).join('');
  document.getElementById('report-rows').innerHTML = t.report.rows.map(([k, v]) =>
    `<div class="row"><span>${k}</span><span class="v">${v}</span></div>`).join('');
  document.getElementById('start-list').innerHTML = t.start.items.map(li => `<li>${li}</li>`).join('');
  document.getElementById('phases-list').innerHTML = t.pipeline.phases.map((p, i) => `
    <div class="phase reveal${i ? ' d' + Math.min(i, 2) : ''}">
      <span class="tag">${p.tag}</span>
      <div class="nm">${p.name}</div>
      <div class="wh">${p.desc}</div>
    </div>`).join('');
}

function applyLang(lang) {
  const t = I18N[lang];
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
  document.body.dataset.lang = lang;
  document.title = t.title;

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const val = get(t, el.dataset.i18n);
    if (val != null) el.textContent = val;
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const val = get(t, el.dataset.i18nHtml);
    if (val != null) el.innerHTML = val;
  });

  const svg1 = document.getElementById('svg-pos1');
  const svg28 = document.getElementById('svg-pos28');
  const svgTh = document.getElementById('svg-threshold');
  svg1.textContent = t.svg.pos1;
  svg1.setAttribute('font-family', t.svg.font);
  svg28.textContent = t.svg.pos28;
  svg28.setAttribute('font-family', t.svg.font);
  svgTh.textContent = t.svg.threshold;

  document.querySelectorAll('.lang-switch button').forEach(btn => {
    const on = btn.dataset.lang === lang;
    btn.classList.toggle('active', on);
    btn.setAttribute('aria-pressed', on);
  });

  renderLists(lang);
  localStorage.setItem('landing-lang', lang);

  document.querySelectorAll('.reveal').forEach(el => {
    el.classList.remove('in');
    io.observe(el);
  });
}

const io = new IntersectionObserver(es => {
  es.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
}, { threshold: .08, rootMargin: '0px 0px -40px 0px' });

const saved = localStorage.getItem('landing-lang');
const initial = saved || (navigator.language.startsWith('zh') ? 'zh' : 'en');
applyLang(initial);

document.querySelectorAll('.lang-switch button').forEach(btn => {
  btn.addEventListener('click', () => applyLang(btn.dataset.lang));
});
</script>
